version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: taskflow_db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - taskflow_net

  server:
    build: ./server
    container_name: taskflow_server
    restart: on-failure
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/tasks
      - PORT=5000
      - NODE_ENV=production
    depends_on:
      - mongo
    networks:
      - taskflow_net

  client:
    build: ./client
    container_name: taskflow_client
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - server
    networks:
      - taskflow_net

volumes:
  mongo_data:

networks:
  taskflow_net:
    driver: bridge
